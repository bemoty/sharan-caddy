name: build

on:
  push:
    branches: [main]
    paths:
      - modules.json
      - Dockerfile
      - .github/workflows/build.yml
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      caddy_version:
        description: 'Caddy version, empty for latest'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      caddy_version: ${{ steps.version.outputs.value }}
      bundles: ${{ steps.bundles.outputs.json }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Resolve Caddy version
        id: version
        run: |
          VERSION="${{ inputs.caddy_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -sf https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r .tag_name)
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read bundle names
        id: bundles
        run: echo "json=$(jq -c '[.bundles[].name]' modules.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bundle: ${{ fromJson(needs.prepare.outputs.bundles) }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VER="${{ needs.prepare.outputs.caddy_version }}"
          VER="${VER#v}"
          MAJOR_MINOR="$(echo "$VER" | cut -d. -f1,2)"
          BUNDLE="${{ matrix.bundle }}"
          REPO="ghcr.io/${{ github.repository_owner }}/sharan-caddy"
          echo "list=${REPO}:${BUNDLE},${REPO}:${MAJOR_MINOR}-${BUNDLE},${REPO}:${VER}-${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "first=${REPO}:${BUNDLE}" >> "$GITHUB_OUTPUT"

      - name: Check bundle type
        id: type
        run: |
          RETAG=$(jq -r --arg b "${{ matrix.bundle }}" '.bundles[] | select(.name == $b) | .retag // ""' modules.json)
          echo "retag=$RETAG" >> "$GITHUB_OUTPUT"

      - name: Retag upstream image
        if: steps.type.outputs.retag != ''
        run: |
          SOURCE="${{ steps.type.outputs.retag }}"
          TAG_ARGS=$(echo "${{ steps.tags.outputs.list }}" | tr ',' '\n' | while read -r t; do printf -- '--tag %s ' "$t"; done)
          docker buildx imagetools create $TAG_ARGS "$SOURCE"

      - name: Build and push
        if: steps.type.outputs.retag == ''
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          build-args: |
            BUNDLE=${{ matrix.bundle }}
            CADDY_VERSION=${{ needs.prepare.outputs.caddy_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm "${{ steps.tags.outputs.first }}" caddy version

      - name: File issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v6.0.0
        with:
          title: 'Build failed: ${{ matrix.bundle }} (${{ needs.prepare.outputs.caddy_version }})'
          content-filepath: .github/ISSUE_TEMPLATE/build-failed.md
          labels: build-failure
